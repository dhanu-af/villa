{% extends "base.html" %}
{% load static %}

{% block content %}

  <header class="chc-page-header" style="background-image: url('{% static 'images/placeholder-hero.svg' %}');">
    <div class="container">
      <p class="text-uppercase mb-2" style="letter-spacing:0.2em; color:#e6cd8b;">Good To Know</p>
      <h1>Frequently Asked Questions</h1>
    </div>
  </header>

  <section class="chc-section">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-lg-8">
          <div class="accordion" id="chcFaqAccordion">
            {% for item in faqs %}
              <div class="accordion-item mb-3 border-0 shadow-sm rounded-3 overflow-hidden">
                <h2 class="accordion-header">
                  <button class="accordion-button {% if not forloop.first %}collapsed{% endif %}" type="button" data-bs-toggle="collapse" data-bs-target="#faqItem{{ forloop.counter }}">
                    {{ item.question }}
                  </button>
                </h2>
                <div id="faqItem{{ forloop.counter }}" class="accordion-collapse collapse {% if forloop.first %}show{% endif %}" data-bs-parent="#chcFaqAccordion">
                  <div class="accordion-body text-muted">
                    {{ item.answer }}
                  </div>
                </div>
              </div>
            {% empty %}
              <p class="text-center text-muted">FAQs will appear here once added in the admin dashboard.</p>
            {% endfor %}
          </div>

          <div class="text-center mt-5">
            <p class="text-muted">Still have questions?</p>
            <a href="{% url 'cabana:contact' %}" class="btn btn-outline-green">Contact Us</a>
          </div>
        </div>
      </div>
    </div>
  </section>

{% endblock %}
